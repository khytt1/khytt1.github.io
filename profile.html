<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Khytt Cheats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/profile.js"></script>
    <style>
        .profile-container {
            padding: 150px 10% 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
        }

        .profile-card {
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            text-align: center;
        }

        .profile-pfp {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            margin: 0 auto 20px auto;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .profile-name {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .profile-role {
            font-size: 1.2rem;
            color: var(--warning);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .profile-role.role-mod {
            color: var(--secondary);
        }

        .profile-role.role-user {
            color: var(--text-dim);
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .edit-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: none;
            /* Hidden by default */
        }

        .edit-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .status-badge.banned {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .status-badge.muted {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .hidden {
            display: none !important;
        }

        .loader {
            margin: 50px auto;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <canvas id="particleCanvas" class="mesh-bg"></canvas>

    <nav class="glass-nav">
        <div class="logo"><a href="index.html" style="color:white;text-decoration:none;">KHYTT<span>CHEATS</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#status">Status</a></li>
            <li><a href="index.html#products">Products</a></li>
            <li><a href="community.html">Community</a></li>
            <li id="navProfileLi" style="display:none;"><a href="profile.html">My Profile</a></li>
        </ul>
    </nav>

    <div class="profile-container">
        <div class="profile-card glass" id="profileCard">
            <div id="profileLoader" class="loader"></div>

            <div id="profileContent" class="hidden">
                <div id="profileStatus" class="status-badge hidden"></div>
                <img id="pfpImg" class="profile-pfp" src="" alt="Profile Picture">
                <h1 id="pName" class="profile-name">Loading...</h1>
                <div id="pRole" class="profile-role">User</div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <span id="pMsgCount" class="stat-value">0</span>
                        <span class="stat-label">Messages Sent</span>
                    </div>
                </div>

                <div class="hero-actions" style="justify-content: center;">
                    <button id="editBtn" class="edit-btn">Edit Profile</button>
                    <a href="community.html" class="btn-outline">Back to Chat</a>
                </div>
            </div>

            <h2 id="errorMsg" class="hidden" style="color:var(--warning);">User not found.</h2>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <span class="modal-close" id="closeEditModal">&times;</span>
            <div class="support-form">
                <h2>Edit Profile</h2>
                <div class="form-group">
                    <label>Profile Picture URL</label>
                    <input type="text" id="editPfpInput" placeholder="https://i.imgur.com/your-image.png">
                    <small style="color:var(--text-dim); display:block; margin-top:5px;">Paste a direct link to an image
                        (Imgur, Discord, etc).</small>
                </div>
                <!-- <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="editNameInput" placeholder="New Display Name">
                </div> -->
                <button class="submit-btn" id="saveProfileBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
