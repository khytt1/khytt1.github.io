<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Khytt Cheats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QZHNPC5EK9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-QZHNPC5EK9');
    </script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</head>

<body>
    <canvas id="particleCanvas" class="mesh-bg"></canvas>

    <nav class="glass-nav">
        <div class="logo"><a href="index.html" style="color:white;text-decoration:none;">KHYTT<span>CHEATS</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#status">Status</a></li>
            <li><a href="index.html#products">Products</a></li>
            <li><a href="community.html">Community</a></li>
            <li id="navProfileLi" style="display:none;"><a href="profile.html">My Profile</a></li>
            <li><a href="login.html" id="navLoginLink" class="btn-primary">Log In</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="auth-card glass">
            <h2 id="authTitle">Log In</h2>
            <form id="authForm" class="support-form">
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label for="displayName">Username</label>
                    <input type="text" id="displayName" placeholder="e.g. KhyttFan99">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn" id="authSubmitBtn">Log In</button>
                <div id="authStatus" class="form-status" style="margin-top:15px; display:none;"></div>
            </form>
            <p style="text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a href="#" id="toggleAuthMode"
                    style="color: var(--primary); font-weight: 600;">Sign Up</a>
            </p>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
