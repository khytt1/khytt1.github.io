<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Khytt Cheats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin.js"></script>
    <style>
        .admin-container {
            padding: 150px 5% 50px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            font-size: 2.5rem;
            color: var(--primary);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-table th,
        .admin-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-table th {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        .admin-table td {
            color: var(--text-main);
        }

        .admin-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .action-btn {
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-main);
            cursor: pointer;
            transition: 0.3s;
            margin-right: 5px;
            font-size: 0.85rem;
        }

        .action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-btn.danger:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .role-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .role-user {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
        }

        .role-mod {
            background: rgba(59, 130, 246, 0.2);
            color: var(--secondary);
            border: 1px solid var(--secondary);
        }

        .role-admin {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .status-muted {
            color: var(--warning);
            font-weight: bold;
        }

        .status-banned {
            color: #ef4444;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }

        .error-msg {
            color: #ef4444;
            text-align: center;
            margin-top: 50px;
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <canvas id="particleCanvas" class="mesh-bg"></canvas>

    <nav class="glass-nav">
        <div class="logo"><a href="index.html" style="color:white;text-decoration:none;">KHYTT<span>CHEATS</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#status">Status</a></li>
            <li><a href="index.html#products">Products</a></li>
            <li><a href="community.html">Community</a></li>
            <li id="navProfileLi" style="display:none;"><a href="profile.html">My Profile</a></li>
        </ul>
    </nav>

    <div class="admin-container glass" id="authCheck">
        <h2 class="error-msg">Verifying Admin Access...</h2>
    </div>

    <div class="admin-container glass hidden" id="adminDashboard">
        <div class="admin-header">
            <h1>Moderation Dashboard</h1>
            <button class="action-btn" onclick="location.reload()">Refresh Data</button>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>Display Name</th>
                    <th>UID</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <!-- Data populated by JS -->
            </tbody>
        </table>
    </div>

    <script src="main.js"></script>
</body>

</html>
